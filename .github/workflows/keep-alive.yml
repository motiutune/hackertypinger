name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日UTC0時（日本時間9時）に実行
  workflow_dispatch:       # 手動実行も可能

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://yfnxmkqrmpbzpnqzsusg.supabase.co/rest/v1/rankings?limit=1" \
            -H "apikey: sb_publishable_SUagZt0Rs83NvR7T63l04g_va9NV_IB" \
            -H "Authorization: Bearer sb_publishable_SUagZt0Rs83NvR7T63l04g_va9NV_IB")
          echo "Supabase response: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Supabase is alive"
          else
            echo "❌ Supabase returned $STATUS"
            exit 1
          fi
